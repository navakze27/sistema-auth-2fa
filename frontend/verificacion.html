<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación 2FA - Sistema Seguro</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Unos retoques extra solo para esta pantalla */
        .codigo-input {
            font-size: 24px;
            letter-spacing: 10px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h2>Verificación de Seguridad</h2>
        <p style="text-align: center; color: #666; font-size: 14px; margin-bottom: 20px;">
            Ingresa el código de 6 dígitos generado por tu aplicación autenticadora.
        </p>
        
        <form id="formularioVerificacion">
            <div class="grupo-input">
                <input type="text" id="codigo2fa" class="codigo-input" maxlength="6" required placeholder="000000" autocomplete="off">
            </div>

            <button type="submit">Verificar y Entrar</button>
        </form>
    </div>

    <script src="verificacion.js"></script>
</body>
</html>
