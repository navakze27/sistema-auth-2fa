<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Sistema 2FA</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="contenedor">
        <h2 id="titulo-pantalla">Crear Cuenta</h2>
        
        <form id="formularioRegistro">
            <div class="grupo-input">
                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" placeholder="ejemplo@correo.com">
            </div>
            <div class="grupo-input">
                <label for="phone">Teléfono (opcional):</label>
                <input type="tel" id="phone" placeholder="1234567890">
            </div>
            <div class="grupo-input">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" required placeholder="Tu contraseña segura">
            </div>
            <div class="grupo-input">
                <label for="two_factor_method">Método 2FA preferido:</label>
                <select id="two_factor_method" required>
                    <option value="token">App Autenticadora (Ej. Google Auth)</option>
                    <option value="email">Código por Correo (Pronto)</option>
                    <option value="sms">Código por SMS (Pronto)</option>
                </select>
            </div>
            <button type="submit">Registrarme</button>
        </form>

        <div id="seccion-qr">
            <h3>¡Registro Exitoso!</h3>
            <p>Escanea este código con tu app de autenticación (Google Authenticator, Authy, etc.)</p>
            <img id="imagen-qr" src="" alt="Código QR">
            <p>O ingresa esta clave manualmente:</p>
            <p class="codigo-manual" id="codigo-manual"></p>
            <br>
            <button onclick="window.location.reload()">Terminar y volver al inicio</button>
        </div>

    </div>

    <script src="registro.js"></script>
</body>
</html>
