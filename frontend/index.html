<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Auth | Emanuel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .input-pro { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 12px; width: 100%; transition: all 0.3s; }
        .input-pro:focus { border-color: #38bdf8; outline: none; box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); }
        .btn-pro { background: linear-gradient(90deg, #0ea5e9, #2563eb); padding: 12px; border-radius: 12px; font-weight: 700; transition: transform 0.2s; width: 100%; }
        .btn-pro:active { transform: scale(0.95); }
        .hidden { display: none; }
    </style>
</head>
<body class="flex items-center justify-center h-screen p-4">

    <div id="app" class="glass p-8 rounded-3xl w-full max-w-md shadow-2xl">
        <div id="header" class="text-center mb-8">
            <h1 class="text-3xl font-bold tracking-tight text-sky-400">NEXUS AUTH</h1>
            <p class="text-slate-400 text-sm">Seguridad de Grado Militar</p>
        </div>

        <div id="v-auth">
            <div class="flex gap-4 mb-6">
                <button id="tabL" onclick="setTab('L')" class="flex-1 pb-2 border-b-2 border-sky-500 font-bold">Login</button>
                <button id="tabR" onclick="setTab('R')" class="flex-1 pb-2 border-b-2 border-transparent text-slate-500">Registro</button>
            </div>
            
            <form id="f-auth" class="space-y-4">
                <div id="reg-fields" class="hidden animate-fade-in">
                    <label class="text-xs font-bold text-slate-400">TELÉFONO (OPCIONAL)</label>
                    <input type="tel" id="a-phone" class="input-pro mb-4" placeholder="7221234567">
                </div>
                <label class="text-xs font-bold text-slate-400">EMAIL O USUARIO</label>
                <input type="text" id="a-user" class="input-pro" placeholder="usuario@nexus.com" required>
                <label class="text-xs font-bold text-slate-400">CONTRASEÑA</label>
                <input type="password" id="a-pass" class="input-pro" placeholder="••••••••" required>
                <button type="submit" class="btn-pro mt-6">CONTINUAR</button>
            </form>
        </div>

        <div id="v-2fa" class="hidden space-y-4 text-center">
            <h2 class="text-xl font-bold">Verifica tu Identidad</h2>
            <p class="text-slate-400 text-sm mb-6">Selecciona un canal seguro</p>
            <button onclick="sendCode('telegram')" class="btn-pro !bg-sky-600">Telegram Bot</button>
            <button onclick="sendCode('email')" class="btn-pro !bg-slate-700">Correo Electrónico</button>
            <button onclick="sendCode('app')" class="btn-pro !bg-indigo-600">Google Authenticator</button>
        </div>

        <div id="v-val" class="hidden space-y-6 text-center">
            <div id="qr-box" class="hidden bg-white p-4 rounded-xl inline-block">
                <img id="qr-img" src="" class="mx-auto">
                <p class="text-black text-[10px] mt-2 font-mono" id="qr-manual"></p>
            </div>
            <p class="text-slate-400 text-sm" id="val-msg">Ingresa el código</p>
            <input type="text" id="v-code" maxlength="6" class="input-pro text-center text-2xl tracking-[10px]" placeholder="000000">
            <button onclick="verifyCode()" class="btn-pro">ACCEDER AL NÚCLEO</button>
        </div>

        <div id="v-success" class="hidden text-center space-y-6 py-10">
            <div class="text-6xl">🔓</div>
            <h1 class="text-3xl font-bold text-sky-400">¡ACCESO CONCEDIDO!</h1>
            <p class="text-slate-300">Bienvenido, Ingeniero Noe.</p>
            <button onclick="location.reload()" class="text-sky-500 text-sm font-bold">CERRAR SESIÓN</button>
        </div>
    </div>

    <script>
        let mode = 'L';
        let uData = { id: null, email: null, method: null };

        function setTab(t) {
            mode = t;
            document.getElementById('tabL').className = t === 'L' ? 'flex-1 pb-2 border-b-2 border-sky-500 font-bold' : 'flex-1 pb-2 border-b-2 border-transparent text-slate-500';
            document.getElementById('tabR').className = t === 'R' ? 'flex-1 pb-2 border-b-2 border-sky-500 font-bold' : 'flex-1 pb-2 border-b-2 border-transparent text-slate-500';
            document.getElementById('reg-fields').classList.toggle('hidden', t === 'L');
        }

        document.getElementById('f-auth').onsubmit = async (e) => {
            e.preventDefault();
            const route = mode === 'L' ? '/api/login' : '/api/registro';
            const body = mode === 'L' ? 
                { identificador: document.getElementById('a-user').value, password: document.getElementById('a-pass').value } :
                { email: document.getElementById('a-user').value, phone: document.getElementById('a-phone').value, password: document.getElementById('a-pass').value };

            const res = await fetch(route, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)});
            const data = await res.json();
            
            if(res.ok) {
                if(mode === 'R') { alert('¡Registrado! Ahora inicia sesión'); setTab('L'); }
                else { uData.id = data.userId; uData.email = data.email; show('v-2fa'); }
            } else alert(data.error);
        };

        async function sendCode(m) {
            uData.method = m;
            const res = await fetch('/api/solicitar-2fa', { method: 'POST', headers: {'Content-Type':'application/json'}, 
                body: JSON.stringify({ userId: uData.id, metodo: m, email: uData.email })});
            const data = await res.json();
            if(res.ok) {
                show('v-val');
                if(data.requiereQR) {
                    document.getElementById('qr-box').classList.remove('hidden');
                    document.getElementById('qr-img').src = data.qrUrl;
                    document.getElementById('qr-manual').innerText = data.secretoManual;
                }
            }
        }

        async function verifyCode() {
            const res = await fetch('/api/verificar-2fa', { method: 'POST', headers: {'Content-Type':'application/json'}, 
                body: JSON.stringify({ userId: uData.id, token: document.getElementById('v-code').value, metodo: uData.method })});
            if(res.ok) show('v-success');
            else alert('Código Erróneo');
        }

        function show(id) {
            ['v-auth', 'v-2fa', 'v-val', 'v-success'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>
