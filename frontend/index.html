<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Seguro - Sistema Emanuel</title>
    <style>
        /* Estilos base (los mismos de antes) */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); 
            display: flex; justify-content: center; align-items: center; height: 100vh; color: #333;
        }
        .tarjeta-maestra {
            background: rgba(255, 255, 255, 0.95);
            width: 380px; min-height: 450px;
            border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden; position: relative; padding: 30px;
            transition: all 0.3s ease; text-align: center;
        }
        .encabezado { display: flex; justify-content: space-around; border-bottom: 2px solid #eee; margin-bottom: 25px; padding-bottom: 10px; }
        .tab { 
            background: none; border: none; font-size: 18px; font-weight: bold; color: #888; 
            cursor: pointer; transition: color 0.3s; 
        }
        .tab.activo { color: #1e3c72; border-bottom: 3px solid #1e3c72; padding-bottom: 8px; margin-bottom: -12px; }
        
        .formulario { display: none; animation: aparecer 0.4s ease-in-out; text-align: left; }
        .formulario.activo { display: block; }
        
        @keyframes aparecer { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .grupo-input { margin-bottom: 18px; }
        label { display: block; margin-bottom: 5px; font-size: 13px; font-weight: 600; color: #555; }
        input { 
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; 
            font-size: 14px; background: #f9f9f9; transition: border 0.3s;
        }
        input:focus { border-color: #1e3c72; outline: none; background: #fff; }
        
        .btn-principal {
            width: 100%; padding: 14px; background: #1e3c72; color: white; border: none; 
            border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s;
            margin-top: 10px;
        }
        .btn-principal:hover { background: #152a55; }
        
        /* Estilos nuevos para 2FA */
        .btn-secundario {
            width: 100%; padding: 12px; background: #f0f0f0; color: #333; border: 1px solid #ddd;
            border-radius: 8px; font-size: 14px; cursor: pointer; margin-top: 10px; font-weight: bold;
        }
        .btn-secundario:hover { background: #e0e0e0; }
        .qr-container { display: none; text-align: center; margin-top: 15px; }
        .qr-container img { max-width: 200px; border-radius: 8px; border: 1px solid #ddd; }
        .codigo-input { font-size: 24px; letter-spacing: 8px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div class="tarjeta-maestra">
        <div class="encabezado" id="nav-tabs">
            <button class="tab activo" onclick="cambiarPestaña('login')">Iniciar Sesión</button>
            <button class="tab" onclick="cambiarPestaña('registro')">Registrarse</button>
        </div>

        <div id="vista-login" class="formulario activo">
            <form id="formLogin">
                <div class="grupo-input">
                    <label>Correo o Teléfono</label>
                    <input type="text" id="log-identificador" placeholder="ejemplo@correo.com" required>
                </div>
                <div class="grupo-input">
                    <label>Contraseña</label>
                    <input type="password" id="log-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-principal">Entrar al Sistema</button>
            </form>
        </div>

        <div id="vista-registro" class="formulario">
            <form id="formRegistro">
                <div class="grupo-input">
                    <label>Correo Electrónico (Obligatorio para opción de correo)</label>
                    <input type="email" id="reg-email" placeholder="ejemplo@correo.com" required>
                </div>
                <div class="grupo-input">
                    <label>Teléfono (Opcional)</label>
                    <input type="tel" id="reg-phone" placeholder="7221234567">
                </div>
                <div class="grupo-input">
                    <label>Contraseña</label>
                    <input type="password" id="reg-password" placeholder="Crea una contraseña segura" required>
                </div>
                <button type="submit" class="btn-principal">Crear Cuenta</button>
            </form>
        </div>

        <div id="vista-elegir-2fa" class="formulario" style="text-align: center;">
            <h2 style="color: #1e3c72; margin-bottom: 10px;">Protección 2FA</h2>
            <p style="font-size: 14px; color: #666; margin-bottom: 20px;">¿Cómo deseas recibir tu código de seguridad hoy?</p>
            
            <button class="btn-principal" onclick="solicitar2FA('app')">📱 Usar Google Authenticator</button>
            <button class="btn-secundario" onclick="solicitar2FA('email')">✉️ Enviar código por Correo</button>
        </div>

        <div id="vista-verificar" class="formulario" style="text-align: center;">
            <h2 style="color: #1e3c72; margin-bottom: 10px;">Verificación</h2>
            <p id="mensaje-verificacion" style="font-size: 14px; color: #666; margin-bottom: 15px;">Ingresa el código</p>
            
            <div id="qr-section" class="qr-container">
                <img id="imagen-qr" src="" alt="QR Code">
                <p style="font-size: 12px; margin-top: 10px;">O ingresa esta clave manual:<br><strong id="codigo-manual"></strong></p>
            </div>

            <form id="formVerificar" style="margin-top: 20px;">
                <input type="text" id="codigo2fa" class="codigo-input" maxlength="6" placeholder="000000" autocomplete="off" required>
                <button type="submit" class="btn-principal">Verificar y Entrar</button>
            </form>
        </div>

    </div>

    <script>
        // Memoria temporal en el navegador
        let sessionUserId = null;
        let sessionEmail = null;
        let metodoElegido = null;

        // Función para cambiar entre vistas
        function mostrarVista(idVista, ocultarTabs = false) {
            document.querySelectorAll('.formulario').forEach(f => f.classList.remove('activo'));
            document.getElementById(idVista).classList.add('activo');
            
            if(ocultarTabs) document.getElementById('nav-tabs').style.display = 'none';
            else document.getElementById('nav-tabs').style.display = 'flex';
        }

        // Función para cambiar pestañas (Login/Registro)
        function cambiarPestaña(vista) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('activo'));
            if(vista === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('activo');
                mostrarVista('vista-login');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('activo');
                mostrarVista('vista-registro');
            }
        }

        // --- REGISTRO ---
        document.getElementById('formRegistro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('reg-email').value;
            const phone = document.getElementById('reg-phone').value;
            const password = document.getElementById('reg-password').value;

            try {
                const res = await fetch('http://localhost:3000/api/registro', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, phone, password })
                });
                const data = await res.json();
                if(res.ok) {
                    alert(data.mensaje);
                    document.getElementById('formRegistro').reset();
                    cambiarPestaña('login');
                } else alert('Error: ' + data.error);
            } catch(e) { alert('Error conectando al servidor'); }
        });

        // --- LOGIN (Paso 1) ---
        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault();
            const identificador = document.getElementById('log-identificador').value;
            const password = document.getElementById('log-password').value;
            const esCorreo = identificador.includes('@');

            try {
                const res = await fetch('http://localhost:3000/api/login', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email: esCorreo ? identificador : null, 
                        phone: !esCorreo ? identificador : null, 
                        password 
                    })
                });
                const data = await res.json();
                
                if(res.ok) {
                    // Guardamos datos temporales y mostramos pantalla de elección
                    sessionUserId = data.userId;
                    sessionEmail = data.email;
                    mostrarVista('vista-elegir-2fa', true);
                } else alert('Error: ' + data.error);
            } catch(e) { alert('Error conectando al servidor'); }
        });

        // --- SOLICITAR 2FA (Paso 2) ---
        async function solicitar2FA(metodo) {
            metodoElegido = metodo;
            try {
                const res = await fetch('http://localhost:3000/api/solicitar-2fa', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: sessionUserId, metodo: metodo, email: sessionEmail })
                });
                const data = await res.json();

                if(res.ok) {
                    mostrarVista('vista-verificar', true);
                    document.getElementById('mensaje-verificacion').innerText = data.mensaje;
                    
                    if(metodo === 'app' && data.requiereQR) {
                        document.getElementById('qr-section').style.display = 'block';
                        document.getElementById('imagen-qr').src = data.qrUrl;
                        document.getElementById('codigo-manual').innerText = data.secretoManual;
                    } else {
                        document.getElementById('qr-section').style.display = 'none';
                    }
                } else {
                    alert('Error: ' + data.error);
                    mostrarVista('vista-elegir-2fa', true); // Lo regresamos si falla (ej. no tiene correo)
                }
            } catch(e) { alert('Error solicitando 2FA'); }
        }

        // --- VERIFICAR (Paso Final) ---
        document.getElementById('formVerificar').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = document.getElementById('codigo2fa').value;

            try {
                const res = await fetch('http://localhost:3000/api/verificar-2fa', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: sessionUserId, token, metodo: metodoElegido })
                });
                const data = await res.json();

                if(res.ok) {
                    document.body.innerHTML = '<div style="text-align:center; color:white; margin-top:20vh;"><h1>🔐 ¡Bienvenido, Emanuel!</h1><h2>Estás dentro del sistema seguro.</h2></div>';
                } else alert('Error: ' + data.error);
            } catch(e) { alert('Error verificando código'); }
        });
    </script>
</body>
</html>
